<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}HDI Predictor{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <nav class="nav">
    <a class="brand" href="{{ url_for('home') }}">
      <span class="brand-mark">HDI</span> Predictor
    </a>
    <div class="nav-links">
      <a href="{{ url_for('home') }}">Home</a>
      <a href="{{ url_for('predict') }}">Predict</a>
      <a href="{{ url_for('insights') }}">Insights</a>
    </div>
  </nav>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <p>
      Linear Regression &middot; R&sup2; {{ metrics.r2_test }} &middot;
      Trained on {{ metrics.n_countries }} countries &middot;
      Indicator data from the UNDP Human Development Report 2021&ndash;22
    </p>
  </footer>
</body>
</html>
